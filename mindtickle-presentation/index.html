  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; -webkit-font-smoothing: antialiased; }

    .pres-root { font-family: 'IBM Plex Sans', sans-serif; width: 100%; margin: 0 auto; background: #fff; padding: 0 48px 32px; }
    .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 10px; border-bottom: 1px solid #eee; margin-bottom: 18px; gap: 8px; }
    .nav-slides { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
    .flex-row { display: flex; gap: 20px; align-items: flex-start; }
    .flex-col-stack { display: flex; flex-direction: column; gap: 20px; }
    .chart-col { flex: 1 1 55%; min-width: 0; }
    .sidebar-col { flex: 1 1 40%; min-width: 0; }
    .orbit-col { flex: 1 1 50%; min-width: 0; }
    .metrics-col { flex: 0 0 280px; }
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
    .grid-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .grid-4col { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
    .stats-bar { display: flex; border-top: 2px solid #111; border-bottom: 1px solid #eee; margin-bottom: 16px; }
    .phase-tabs { display: flex; gap: 0; margin-bottom: 16px; border-top: 2px solid #111; }
    .phase-content { display: flex; gap: 20px; margin-bottom: 16px; }
    .intervention-btns { display: flex; gap: 4px; flex-wrap: wrap; }

    @media (max-width: 768px) {
      .pres-root { padding: 0 16px 20px; }
      .nav-bar { flex-wrap: wrap; justify-content: center; gap: 6px; }
      .nav-slides { gap: 2px; }
      .nav-slides button { font-size: 7px !important; padding: 4px 6px !important; }
      .nav-bar > button { font-size: 9px !important; padding: 4px 10px !important; }
      .flex-row { flex-direction: column; gap: 16px; }
      .chart-col, .sidebar-col, .orbit-col { flex: 1 1 100%; }
      .metrics-col { flex: 1 1 100%; }
      .phase-content { flex-direction: column; gap: 16px; }
      .grid-2col { grid-template-columns: 1fr; }
      .grid-3col { grid-template-columns: 1fr; }
      .grid-4col { grid-template-columns: 1fr 1fr; }
      .stats-bar { flex-wrap: wrap; }
      .stats-bar > div { flex: 1 1 50% !important; min-width: 0; }
      .phase-tabs > div { padding: 8px 6px !important; }
      .intervention-btns { gap: 3px; }
      .intervention-btns button { font-size: 7px !important; padding: 3px 6px !important; }
      h1 { font-size: 17px !important; }
    }

    @media (max-width: 480px) {
      .pres-root { padding: 0 12px 16px; }
      .grid-4col { grid-template-columns: 1fr; }
      .stats-bar > div { flex: 1 1 50% !important; }
      .phase-tabs { flex-wrap: wrap; }
