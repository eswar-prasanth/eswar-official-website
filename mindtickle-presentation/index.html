  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .nav-slides { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
    .flex-row { display: flex; gap: 12px; align-items: flex-start; }
    .chart-col { flex: 1 1 55%; min-width: 0; }
    .sidebar-col { flex: 1 1 40%; min-width: 0; }
    .orbit-col { flex: 0 0 38%; min-width: 0; }
    .metrics-col { flex: 0 0 300px; }
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
    .grid-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .grid-4col { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
    .stats-bar { display: flex; border-top: 2px solid #111; border-bottom: 1px solid #eee; margin-bottom: 8px; }
    .phase-tabs { display: flex; gap: 0; margin-bottom: 6px; border-top: 2px solid #111; }
    .phase-content { display: flex; gap: 12px; margin-bottom: 6px; }
    .intervention-btns { display: flex; gap: 3px; flex-wrap: wrap; }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .s2-bottom-row { display: flex; gap: 16px; }

    @media (max-width: 768px) {
      .pres-root { padding: 0 16px 20px; }
      .nav-bar { flex-wrap: wrap; justify-content: center; gap: 6px; }
      .nav-slides { gap: 2px; }
      .nav-slides button { font-size: 10px !important; padding: 3px 5px !important; }
      .nav-bar > button { font-size: 12px !important; padding: 4px 10px !important; }
      .flex-row { flex-direction: column; gap: 16px; }
      .chart-col, .sidebar-col, .orbit-col { flex: 1 1 100%; }
      .metrics-col { flex: 1 1 100%; }
      .phase-content { flex-direction: column; gap: 16px; }
      .grid-2col { grid-template-columns: 1fr; }
      .grid-3col { grid-template-columns: 1fr; }
      .grid-4col { grid-template-columns: 1fr 1fr; }
      .stats-bar { flex-wrap: wrap; }
      .stats-bar > div { flex: 1 1 50% !important; min-width: 0; }
      .phase-tabs > div { padding: 8px 6px !important; }
      .intervention-btns { gap: 3px; }
      .intervention-btns button { font-size: 10px !important; padding: 3px 5px !important; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      .s2-bottom-row { flex-direction: column; }
      h1 { font-size: 22px !important; }
    }

    @media (max-width: 480px) {
      .pres-root { padding: 0 12px 16px; }
      .grid-4col { grid-template-columns: 1fr; }
      .metrics-grid { grid-template-columns: 1fr; }
      .stats-bar > div { flex: 1 1 50% !important; }
      .phase-tabs { flex-wrap: wrap; }
      .phase-tabs > div { flex: 1 1 45% !important; }
      h1 { font-size: 18px !important; }
    }

    function S1Chart({clients,hov,setHov,sel,setSel,aq,setAq}) {
      const W=620,H=420,pad={top:14,right:20,bottom:44,left:54},cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
      const xP=v=>pad.left+(v/100)*cW,yP=v=>pad.top+cH-(v/100)*cH;
      const qF={q2:"#f5f5f5",q1:"#fafafa",q3:"#ededed",q4:"#f5f5f5"};
      const qB=[{k:"q2",x:pad.left,y:pad.top},{k:"q1",x:pad.left+cW/2,y:pad.top},{k:"q3",x:pad.left,y:pad.top+cH/2},{k:"q4",x:pad.left+cW/2,y:pad.top+cH/2}];

      const labelOffsets={
        "Ford":{dx:0,dy:-1,anchor:"middle"},
        "Wipro":{dx:0,dy:-1,anchor:"middle"},
        "Boston Scientific":{dx:0,dy:-1,anchor:"middle"},
        "J&J":{dx:0,dy:-1,anchor:"middle"},
        "Cisco":{dx:0,dy:-1,anchor:"end"},
        "WWT":{dx:-4,dy:1,anchor:"end"},
        "Splunk":{dx:-4,dy:-1,anchor:"end"},
        "Juniper Networks":{dx:4,dy:1,anchor:"start"},
        "Darktrace":{dx:4,dy:-1,anchor:"start"},
        "CentiMark":{dx:0,dy:-1,anchor:"middle"},
      };
      const pts=clients.map((c,i)=>{
        const r=10+(c.pot/20000)*14;
        return {i,cx:xP(c.dh),cy:yP(c.rs),r,name:c.name};
      });
      const lbls=pts.map(p=>{
        const off=labelOffsets[p.name]||{dx:0,dy:-1,anchor:"middle"};
        const tx = off.anchor==="start" ? p.cx+p.r+4+off.dx : off.anchor==="end" ? p.cx-p.r-4+off.dx : p.cx+off.dx;
        const ty = off.dy<0 ? p.cy-p.r-6 : p.cy+p.r+14;
        return {tx,ty,anchor:off.anchor,name:p.name};
      });

      return h("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",display:"block"}},
        qB.map(({k,x,y})=>h("rect",{key:k,x,y,width:cW/2,height:cH/2,fill:aq===k?"#e8e8e8":qF[k],onClick:()=>{setAq(aq===k?null:k);setSel(null)},style:{cursor:"pointer",transition:"fill 0.15s"}})),
        [{x:.25,y:18,t:"ACTIVATE",f:"#888"},{x:.75,y:18,t:"CO-CREATE",f:"#444"},{x:.25,y:cH-6,t:"STABILISE & PROVE VALUE",f:"#666"},{x:.75,y:cH-6,t:"BUILD RELATIONSHIP",f:"#999"}].map(({x,y,t,f})=>h("text",{key:t,x:pad.left+cW*x,y:pad.top+y,textAnchor:"middle",fontSize:"11",fill:f,fontWeight:"600",fontFamily:"'IBM Plex Sans',sans-serif",letterSpacing:"0.04em",style:{pointerEvents:"none"}},t)),
        h("line",{x1:pad.left+cW/2,y1:pad.top,x2:pad.left+cW/2,y2:pad.top+cH,stroke:"#ccc",strokeWidth:"0.75",strokeDasharray:"4,3",style:{pointerEvents:"none"}}),
        h("line",{x1:pad.left,y1:pad.top+cH/2,x2:pad.left+cW,y2:pad.top+cH/2,stroke:"#ccc",strokeWidth:"0.75",strokeDasharray:"4,3",style:{pointerEvents:"none"}}),
        h("rect",{x:pad.left,y:pad.top,width:cW,height:cH,fill:"none",stroke:"#444",strokeWidth:"1",style:{pointerEvents:"none"}}),
        h("text",{x:pad.left+cW/2,y:H-6,textAnchor:"middle",fontSize:"12",fill:"#333",fontWeight:"600",fontFamily:"'IBM Plex Sans',sans-serif",style:{pointerEvents:"none"}},"Deployment Health \u2192"),
        h("text",{x:12,y:pad.top+cH/2,textAnchor:"middle",fontSize:"12",fill:"#333",fontWeight:"600",fontFamily:"'IBM Plex Sans',sans-serif",transform:`rotate(-90,12,${pad.top+cH/2})`,style:{pointerEvents:"none"}},"Relationship Strength \u2192"),
        [0,50,100].map(v=>h("text",{key:`x${v}`,x:xP(v),y:pad.top+cH+15,textAnchor:"middle",fontSize:"10",fill:"#bbb",fontFamily:"'IBM Plex Sans',sans-serif",style:{pointerEvents:"none"}},v)),
        [0,50,100].map(v=>h("text",{key:`y${v}`,x:pad.left-7,y:yP(v)+3,textAnchor:"end",fontSize:"10",fill:"#bbb",fontFamily:"'IBM Plex Sans',sans-serif",style:{pointerEvents:"none"}},v)),
        clients.map((c,i)=>{const wp=Math.round((c.cur/c.pot)*100),cx=pts[i].cx,cy=pts[i].cy,r=pts[i].r,gv=Math.round(195-(wp/100)*155),iS=sel===i;
        const lbl=lbls[i];
        return h("g",{key:c.name,onMouseEnter:()=>setHov(i),onMouseLeave:()=>setHov(null),onClick:e=>{e.stopPropagation();setSel(iS?null:i);setAq(null)},style:{cursor:"pointer"}},
          h("circle",{cx,cy,r,fill:`rgb(${gv},${gv},${gv})`,stroke:iS?"#000":"#999",strokeWidth:iS?2:0.5,opacity:hov===i||iS?1:0.85,style:{transition:"all 0.15s"}}),
          (Math.abs(lbl.tx-cx)>2||Math.abs(lbl.ty-(cy-r))>18) && h("line",{x1:cx,y1:lbl.ty<cy?cy-r:cy+r,x2:lbl.anchor==="start"?lbl.tx-2:lbl.anchor==="end"?lbl.tx+2:lbl.tx,y2:lbl.ty<cy?lbl.ty+4:lbl.ty-10,stroke:"#bbb",strokeWidth:"0.5",style:{pointerEvents:"none"}}),
          h("text",{x:lbl.tx,y:lbl.ty,textAnchor:lbl.anchor,fontSize:"11",fontWeight:"600",fill:"#222",fontFamily:"'IBM Plex Sans',sans-serif",style:{pointerEvents:"none"}},c.name),
          h("text",{x:cx,y:cy+3.5,textAnchor:"middle",fontSize:"11",fontWeight:"700",fill:wp>45?"#fff":"#333",fontFamily:"'IBM Plex Sans',sans-serif",style:{pointerEvents:"none"}},wp+"%")
        )})
      );
    }

    function OrbitDiag({ps,ap,setAp}) {
      const W=400,H=360,cx=W/2,cy=H/2,r1=100,r2=155;
      return h("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",display:"block"}},
        h("circle",{cx,cy,r:r1,fill:"none",stroke:"#ddd",strokeWidth:"0.75",strokeDasharray:"4,3"}),
        h("circle",{cx,cy,r:r2,fill:"none",stroke:"#eee",strokeWidth:"0.75",strokeDasharray:"4,3"}),
        h("circle",{cx,cy,r:34,fill:"#222"}),
        h("text",{x:cx,y:cy-4,textAnchor:"middle",fontSize:"13",fontWeight:"700",fill:"#fff",fontFamily:"'IBM Plex Sans',sans-serif"},"CRO"),
        h("text",{x:cx,y:cy+9,textAnchor:"middle",fontSize:"10",fill:"#aaa",fontFamily:"'IBM Plex Sans',sans-serif"},"Revenue Officer"),
        ps.map(p=>{const r=p.orbit===1?r1:r2,rad=(p.angle*Math.PI)/180,px=cx+r*Math.cos(rad),py=cy+r*Math.sin(rad),isA=ap===p.id,nR=33,ls=p.label.split("\n");
        return h("g",{key:p.id,onClick:()=>setAp(isA?null:p.id),style:{cursor:"pointer"}},
          h("line",{x1:cx,y1:cy,x2:px,y2:py,stroke:"#ddd",strokeWidth:"0.5",style:{pointerEvents:"none"}}),
          h("circle",{cx:px,cy:py,r:nR,fill:isA?"#333":"#f5f5f5",stroke:isA?"#000":"#bbb",strokeWidth:isA?2:0.75,style:{transition:"all 0.15s"}}),
          ls.map((l,i)=>h("text",{key:i,x:px,y:py+(i-(ls.length-1)/2)*11,textAnchor:"middle",fontSize:"10",fontWeight:"600",fill:isA?"#fff":"#444",fontFamily:"'IBM Plex Sans',sans-serif",style:{pointerEvents:"none"}},l))
        )})
      );
    }

            h("div",{style:{fontSize:15,fontWeight:700,color:"#111"}},"Account Examples"),
            h("div",{style:{fontSize:13,color:"#999",transition:"transform 0.2s",transform:showEx?"rotate(90deg)":"rotate(0deg)"}},"\u25b6"),
            h("div",{style:{fontSize:13,color:"#aaa"}},s.examples.map(e=>e.account).join(" \u00b7 "))
          ),
          showEx && h("div",{style:{display:"flex",gap:16,flexWrap:"wrap"}},
            s.examples.map((ex,i)=>h("div",{key:i,style:{flex:"1 1 "+(s.examples.length>2?"30%":"45%"),minWidth:200,padding:"10px 14px",background:"#f9f9f9",borderRadius:6,border:"1px solid #eee"}},
              h("div",{style:{fontSize:15,fontWeight:700,color:"#222",marginBottom:6}},ex.account),
              ex.items.map((it,j)=>h("div",{key:j,style:{display:"flex",gap:6,marginBottom:4,alignItems:"flex-start"}},
                h("div",{style:{flex:"0 0 5px",height:5,borderRadius:3,background:"#888",marginTop:7}}),
                h("div",{style:{fontSize:13,color:"#444",lineHeight:1.45}},it)
              ))
            ))
          )
        )
      );
    }

    // ===== MAIN =====
    function Pres() {
      const [sl,setSl] = useState(1);
      const [s1H,setS1H] = useState(null),[s1S,setS1S] = useState(null),[s1Q,setS1Q] = useState(null);
      const [ap,setAp] = useState(null);
      const tC = CL.reduce((s,c)=>s+c.cur,0), tP = CL.reduce((s,c)=>s+c.pot,0);
      const s1Sel = s1S!==null ? CL[s1S] : null, s1EQ = s1Sel ? s1Sel.q : s1Q;
      const s1Int = s1EQ ? S1I[s1EQ] : null;
      const aP = ap ? PRIO.find(p=>p.id===ap) : null;
      const sn = ["Portfolio","CRO Priorities","Stabilise (Q3)","Activate (Q2)","Relationship (Q4)","Co-Create (Q1)"];

      return h("div",{className:"pres-root"},
        // Nav
        h("div",{className:"nav-bar"},
          h("button",{onClick:()=>setSl(Math.max(1,sl-1)),disabled:sl===1,style:{padding:"6px 16px",fontSize:13,fontWeight:600,borderRadius:3,cursor:sl===1?"default":"pointer",border:"1px solid #ddd",background:sl===1?"#f5f5f5":"#fff",color:sl===1?"#ccc":"#444",fontFamily:"'IBM Plex Sans',sans-serif",whiteSpace:"nowrap"}},"\u2190 Prev"),
          h("div",{className:"nav-slides"},
            sn.map((n,i)=>h("button",{key:i,onClick:()=>setSl(i+1),style:{padding:"5px 10px",borderRadius:3,fontSize:11,fontWeight:600,cursor:"pointer",border:sl===i+1?"1.5px solid #111":"1px solid #ddd",background:sl===i+1?"#111":"#fff",color:sl===i+1?"#fff":"#aaa",fontFamily:"'IBM Plex Sans',sans-serif",whiteSpace:"nowrap"}},n))
          ),
          h("button",{onClick:()=>setSl(Math.min(6,sl+1)),disabled:sl===6,style:{padding:"6px 16px",fontSize:13,fontWeight:600,borderRadius:3,cursor:sl===6?"default":"pointer",border:"1px solid #ddd",background:sl===6?"#f5f5f5":"#fff",color:sl===6?"#ccc":"#444",fontFamily:"'IBM Plex Sans',sans-serif",whiteSpace:"nowrap"}},"Next \u2192")
        ),

        // SLIDE 1
        sl===1 && h("div",null,
          h("h1",{style:{fontSize:22,fontWeight:700,color:"#111",margin:"0 0 1px"}},"Achieving Full Revenue Potential from Existing Accounts"),
          h("p",{style:{fontSize:13,color:"#999",margin:"0 0 6px"}},"Top 10 \u2014 "+fmt(tC)+" of "+fmt(tP)+" addressable \u00b7 "+Math.round((tC/tP)*100)+"% captured \u00b7 "+fmt(tP-tC)+" gap"),
          h("div",{className:"stats-bar"},
            [{l:"Current",v:fmt(tC)},{l:"Addressable",v:fmt(tP)},{l:"Captured",v:Math.round((tC/tP)*100)+"%"},{l:"Gap",v:fmt(tP-tC)}].map(({l,v},i)=>h("div",{key:l,style:{flex:1,padding:"5px 0",textAlign:"center",borderRight:i<3?"1px solid #eee":"none"}},
              h("div",{style:{fontSize:10,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600}},l),
              h("div",{style:{fontSize:20,fontWeight:700,color:"#111",marginTop:1}},v)
            ))
          ),
          h("div",{className:"flex-row",style:{marginBottom:8}},
            h("div",{className:"chart-col"},
              h(S1Chart,{clients:CL,hov:s1H,setHov:setS1H,sel:s1S,setSel:setS1S,aq:s1Q,setAq:setS1Q}),
              h("div",{style:{display:"flex",gap:12,justifyContent:"center",marginTop:4,flexWrap:"wrap"}},
                [{bg:"#ddd",t:"Light = Low capture"},{bg:"#444",t:"Dark = High capture"}].map(({bg,t})=>h("div",{key:t,style:{display:"flex",alignItems:"center",gap:4,fontSize:13,color:"#aaa"}},h("div",{style:{width:10,height:10,borderRadius:"50%",background:bg}}),t)),
                h("div",{style:{fontSize:13,color:"#aaa"}},"Size = Potential")
              )
            ),
            h("div",{className:"sidebar-col"},
              s1Sel ? h("div",null,
                h("div",{style:{fontSize:17,fontWeight:700,color:"#111"}},s1Sel.name),
                h("div",{style:{fontSize:13,color:"#aaa",marginBottom:10}},s1Sel.ind),
                [{l:"Addressable",v:fmt(s1Sel.pot)},{l:"Current",v:fmt(s1Sel.cur)},{l:"Captured",v:Math.round((s1Sel.cur/s1Sel.pot)*100)+"%"},{l:"Gap",v:fmt(s1Sel.pot-s1Sel.cur)},{l:"Deployment Health",v:s1Sel.dh+"/100"},{l:"Relationship",v:s1Sel.rs+"/100"}].map(({l,v})=>h("div",{key:l,style:{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #f0f0f0"}},
                  h("span",{style:{fontSize:14,color:"#999"}},l),
                  h("span",{style:{fontSize:14,fontWeight:600,color:"#111"}},v)
                ))
              ) : h("div",null,
                h("div",{style:{fontSize:15,fontWeight:600,color:"#777",marginBottom:8}},s1Q?"Accounts in quadrant":"Click a bubble or quadrant"),
                (s1Q?CL.filter(c=>c.q===s1Q):CL).map(c=>h("div",{key:c.name,onClick:()=>{setS1S(CL.indexOf(c));setS1Q(null)},style:{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #f3f3f3",cursor:"pointer"}},
                  h("span",{style:{fontSize:14,fontWeight:600,color:"#333"}},c.name),
                  h("div",{style:{fontSize:13}},
                    h("span",{style:{color:"#999"}},fmt(c.cur)),
                    h("span",{style:{color:"#ccc",margin:"0 4px"}},"\u2192"),
                    h("span",{style:{fontWeight:600,color:"#666"}},fmt(c.pot))
                  )
                ))
              )
            )
          ),
          h("div",{style:{borderTop:"2px solid #111",paddingTop:6}},
            s1Int ? h("div",null,
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:6}},
                h("div",null,
                  h("div",{style:{fontSize:15,fontWeight:700,color:"#111"}},QN[s1EQ]),
                  h("div",{style:{fontSize:12,color:"#999"}},QS[s1EQ])
                ),
                h("div",{className:"intervention-btns"},
                  QO.map(q=>h("button",{key:q,onClick:()=>{setS1Q(q);setS1S(null)},style:{padding:"5px 10px",borderRadius:3,fontSize:11,fontWeight:600,border:"1px solid "+(s1EQ===q?"#111":"#ddd"),background:s1EQ===q?"#111":"#fff",color:s1EQ===q?"#fff":"#999",cursor:"pointer",fontFamily:"'IBM Plex Sans',sans-serif"}},QN[q].split("&")[0].split("(")[0].trim()))
                )
              ),
              h("div",{className:"grid-2col"},
                s1Int.items.map((it,i)=>h("div",{key:i,style:{display:"flex",gap:5,alignItems:"flex-start"}},
                  h("div",{style:{flex:"0 0 18px",height:18,borderRadius:3,background:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#888",marginTop:1}},i+1),
                  h("div",{style:{fontSize:13,color:"#444",lineHeight:1.4}},it)
                ))
              ),
              h("div",{style:{marginTop:6,padding:"6px 10px",background:"#f7f7f7",borderLeft:"3px solid #333",fontSize:13,color:"#555",fontWeight:500}},s1Int.focus)
            ) : h("div",null,
              h("div",{style:{fontSize:14,fontWeight:700,color:"#111",marginBottom:6}},"Intervention Playbook by Quadrant"),
              h("div",{className:"grid-4col"},
                QO.map(q=>{const qc=CL.filter(c=>c.q===q);
                return h("div",{key:q,onClick:()=>{setS1Q(q);setS1S(null)},style:{padding:"8px 10px",background:"#f9f9f9",borderRadius:3,cursor:"pointer",border:"1px solid #eee"}},
                  h("div",{style:{fontSize:13,fontWeight:700,color:"#333",marginBottom:2}},QN[q]),
                  h("div",{style:{fontSize:10,color:"#aaa",marginBottom:4}},QS[q]),
                  h("div",{style:{fontSize:10,color:"#888"}},qc.map(c=>c.name).join(", ")),
                  h("div",{style:{marginTop:4,fontSize:12,fontWeight:600,color:"#555"}},fmt(qc.reduce((s,c)=>s+(c.pot-c.cur),0))+" gap \u2192")
                )})
              )
            )
          )
        ),

        // SLIDE 2
        sl===2 && h("div",null,
          h("h1",{style:{fontSize:22,fontWeight:700,color:"#111",margin:"0 0 1px"}},"CRO Priorities \u2014 What Mindtickle Enables vs The Art of the Possible"),
          h("p",{style:{fontSize:13,color:"#999",margin:"0 0 8px"}},"Current capabilities, competitive landscape, and forward opportunity with ElevateOS"),
          h("div",{className:"flex-row",style:{marginBottom:8}},
            h("div",{className:"orbit-col"},h(OrbitDiag,{ps:PRIO,ap,setAp})),
            h("div",{className:"sidebar-col"},
              aP ? h("div",null,
                h("div",{style:{fontSize:18,fontWeight:700,color:"#111",marginBottom:4}},aP.label.replace("\n"," ")),
                h("div",{style:{fontSize:15,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,marginBottom:6}},"What Mindtickle Does Today"),
                h("div",{style:{fontSize:15,color:aP.todayItems.length===0?"#999":"#444",marginBottom:aP.todayItems.length>0?4:8,fontStyle:aP.todayItems.length===0?"italic":"normal",lineHeight:1.5}},aP.today),
                aP.todayItems.map((it,i)=>h("div",{key:i,style:{display:"flex",gap:6,marginBottom:3,alignItems:"flex-start",paddingLeft:4}},
                  h("div",{style:{flex:"0 0 5px",height:5,borderRadius:3,background:"#888",marginTop:8}}),
                  h("div",{style:{fontSize:14,color:"#444",lineHeight:1.45}},it)
                )),
                h("div",{style:{fontSize:15,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,marginTop:10,marginBottom:6}},"What Competition Does"),
                aP.competition.map((it,i)=>h("div",{key:i,style:{display:"flex",gap:6,marginBottom:3,alignItems:"flex-start",paddingLeft:4}},
                  h("div",{style:{flex:"0 0 5px",height:5,borderRadius:3,background:"#ccc",marginTop:8}}),
                  h("div",{style:{fontSize:14,color:"#555",lineHeight:1.45}},it)
                ))
              ) : h("div",{style:{color:"#bbb",fontSize:15,lineHeight:1.6}},
                h("div",{style:{fontWeight:600,color:"#777",fontSize:17,marginBottom:8}},"Click a priority node"),
                PRIO.map(p=>h("div",{key:p.id,onClick:()=>setAp(p.id),style:{padding:"4px 0",borderBottom:"1px solid #f3f3f3",cursor:"pointer"}},
                  h("span",{style:{fontSize:14,fontWeight:600,color:"#333"}},p.label.replace("\n"," ")),
                  h("span",{style:{fontSize:13,color:"#bbb",marginLeft:6}},p.orbit===1?"Core":"Enabling")
                ))
              )
            )
          ),
          h("div",{style:{borderTop:"2px solid #111",paddingTop:8}},
            aP ? h("div",null,
              h("div",{className:"s2-bottom-row"},
                h("div",{style:{flex:1,minWidth:0}},
                  h("div",{style:{fontSize:14,fontWeight:700,color:"#111",marginBottom:4}},"Art of the Possible"),
                  aP.artOfPossible.map((it,i)=>h("div",{key:i,style:{display:"flex",gap:5,marginBottom:3,alignItems:"flex-start"}},
                    h("div",{style:{flex:"0 0 18px",height:18,borderRadius:3,background:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#888",marginTop:1}},i+1),
                    h("div",{style:{fontSize:13,color:"#444",lineHeight:1.35}},it)
                  ))
                ),
                h("div",{className:"metrics-col"},
                  h("div",{style:{fontSize:14,fontWeight:700,color:"#111",marginBottom:4}},"Key CRO Metrics"),
                  aP.metrics.map((m,i)=>h("div",{key:i,style:{padding:"4px 8px",background:i%2===0?"#f9f9f9":"#fff",borderBottom:"1px solid #f0f0f0",fontSize:13,color:"#444"}},m)),
                  h("div",{style:{marginTop:6,padding:"6px 10px",background:"#f7f7f7",borderLeft:"3px solid #333",fontSize:13,color:"#555",lineHeight:1.4}},aP.int)
                )
              )
            ) : h("div",null,
              h("div",{style:{fontSize:15,fontWeight:700,color:"#111",marginBottom:6}},"CRO Priority \u2192 Capability Map"),
              h("div",{className:"grid-3col"},
                PRIO.map(p=>h("div",{key:p.id,onClick:()=>setAp(p.id),style:{padding:"8px 10px",background:"#f9f9f9",borderRadius:3,cursor:"pointer",border:"1px solid #eee"}},
                  h("div",{style:{fontSize:13,fontWeight:700,color:"#333",marginBottom:2}},p.label.replace("\n"," ")),
                  h("div",{style:{fontSize:12,color:"#aaa",marginBottom:3}},p.orbit===1?"Core":"Enabling"),
                  h("div",{style:{fontSize:12,color:"#666",lineHeight:1.3}},p.today.substring(0,80)+"...")
                ))
              )
            )
          )
        ),

        // SLIDES 3-6
        sl===3 && h(PhaseSlide,{data:PHASES.q3}),
        sl===4 && h(PhaseSlide,{data:PHASES.q2}),
        sl===5 && h(PhaseSlide,{data:PHASES.q4}),
        sl===6 && h(PhaseSlide,{data:PHASES.q1})
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(h(Pres));
  </script>
</body>
</html>
